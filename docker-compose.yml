version: '3.9'

services:
  backend:
    build:
      context: ./backend
    image: feiras-backend
    ports:
      - '4000:4000'
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=feiras
      - DB_PORT=3306
      - SESSION_SECRET=alterar_para_um_segredo_forte
      - PORT=4000
      - AWS_REGION=us-east-1
      - SQS_QUEUE_URL=
      - NOTIFICATIONS_SQS_QUEUE_URL=
      - SNS_TOPIC_ARN=
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
    image: feiras-frontend
    ports:
      - '3000:3000'
    environment:
      - API_URL=http://backend:4000
      - ADMIN_URL=http://backend:4000
      - PORT=3000
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: feiras
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./bd/feiras.sql:/docker-entrypoint-initdb.d/feiras.sql:ro

volumes:
  db_data:
